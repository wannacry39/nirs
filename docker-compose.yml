name: puzzle-agents

# Архитектура (каждый компонент в отдельном контейнере):
#
#   creator    — MCP-сервер (AGENT_ROLE=CREATOR), :9001/mcp.
#                Инструмент generate_new_game (LLM).
#
#   checker    — MCP-сервер (AGENT_ROLE=CHECKER), :9002/mcp.
#                Инструменты is_finished, check_is_valid (LLM).
#
#   mcp-server — роутер + хранилище доски. MCP на :9000/mcp.
#                Клиенты к creator/checker (пакет clients). /healthz
#
#   player     — REPL (AGENT_ROLE=PLAYER). MCP-клиент только к mcp-server.
#                Ручные команды /move, /state, /new, /done (см. README).
#
# Порядок запуска:
#   creator и checker стартуют первыми (healthcheck на /healthz).
#   mcp-server ждёт их через depends_on: condition: service_healthy.
#   player запускается вручную через docker compose run.
#
# Команды:
#   docker compose up -d creator checker mcp-server
#   docker compose run --rm player

services:

  # ── агент-создатель ─────────────────────────────────────────────────────────
  creator:
    build:
      context: ./agent-a
    image: puzzle/agent:latest
    container_name: creator
    environment:
      AGENT_ROLE: "CREATOR"
      LISTEN_ADDR: ":9001"
      ENDPOINT_PATH: "/mcp"
      MISTRAL_API_KEY: ${MISTRAL_API_KEY:?set MISTRAL_API_KEY in .env}
      MISTRAL_MODEL: ${MISTRAL_MODEL:-mistral-small-latest}
      MISTRAL_BASE_URL: ${MISTRAL_BASE_URL:-https://api.mistral.ai/v1}
    networks:
      - puzzlenet
    ports:
      - "9001:9001"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:9001/healthz"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  # ── агент-проверяющий ───────────────────────────────────────────────────────
  checker:
    build:
      context: ./agent-a
    image: puzzle/agent:latest
    container_name: checker
    environment:
      AGENT_ROLE: "CHECKER"
      LISTEN_ADDR: ":9002"
      ENDPOINT_PATH: "/mcp"
      MISTRAL_API_KEY: ${MISTRAL_API_KEY:?set MISTRAL_API_KEY in .env}
      MISTRAL_MODEL: ${MISTRAL_MODEL:-mistral-small-latest}
      MISTRAL_BASE_URL: ${MISTRAL_BASE_URL:-https://api.mistral.ai/v1}
    networks:
      - puzzlenet
    ports:
      - "9002:9002"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:9002/healthz"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  # ── MCP-роутер + хранилище ─────────────────────────────────────────────────
  mcp-server:
    build:
      context: ./mcp-server
    image: puzzle/mcp-server:latest
    container_name: mcp-server
    environment:
      LISTEN_ADDR: ":9000"
      ENDPOINT_PATH: "/mcp"
      CREATOR_URL: "http://creator:9001/mcp"
      CHECKER_URL: "http://checker:9002/mcp"
    networks:
      - puzzlenet
    ports:
      - "9000:9000"
    restart: unless-stopped
    depends_on:
      creator:
        condition: service_healthy
      checker:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:9000/healthz"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  # ── агент-игрок (интерактивный) ─────────────────────────────────────────────
  player:
    build:
      context: ./agent-a
    image: puzzle/agent:latest
    container_name: player
    profiles: ["interactive"]
    environment:
      AGENT_ROLE: "PLAYER"
      GAME_SERVER_URL: "http://mcp-server:9000/mcp"
      MISTRAL_API_KEY: ${MISTRAL_API_KEY:?set MISTRAL_API_KEY in .env}
      MISTRAL_MODEL: ${MISTRAL_MODEL:-mistral-small-latest}
      MISTRAL_BASE_URL: ${MISTRAL_BASE_URL:-https://api.mistral.ai/v1}
    networks:
      - puzzlenet
    stdin_open: true
    tty: true
    restart: "no"
    depends_on:
      mcp-server:
        condition: service_healthy

networks:
  puzzlenet:
    driver: bridge
