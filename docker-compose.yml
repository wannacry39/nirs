name: puzzle-agents

# Архитектура (каждый компонент в отдельном контейнере):
#
#   creator    — HTTP-агент (AGENT_ROLE=CREATOR), порт 9001.
#                POST /create_game → LLM генерирует доску + напутствие.
#                Никакого MCP-кода.
#
#   checker    — HTTP-агент (AGENT_ROLE=CHECKER), порт 9002.
#                POST /check_finished → LLM проверяет завершённость.
#                POST /check_move     → LLM валидирует ход + возвращает новое поле.
#                Никакого MCP-кода.
#
#   mcp-server — единственный компонент с MCP-кодом.
#                Хранит состояние доски в памяти.
#                Принимает MCP-запросы от player (порт 9000, /mcp).
#                Принимает REST-запросы от player (порт 9000, /api/*).
#                Роутит к creator и checker через обычный HTTP.
#
#   player     — интерактивный REPL (AGENT_ROLE=PLAYER).
#                LLM принимает решения: какой инструмент вызвать, какую фишку двигать.
#                Вызывает REST API mcp-server (/api/*) через net/http — без MCP-кода.
#
# Порядок запуска:
#   creator и checker стартуют первыми (healthcheck на /healthz).
#   mcp-server ждёт их через depends_on: condition: service_healthy.
#   player запускается вручную через docker compose run.
#
# Команды:
#   docker compose up -d creator checker mcp-server
#   docker compose run --rm player

services:

  # ── агент-создатель ─────────────────────────────────────────────────────────
  creator:
    build:
      context: ./agent-a
    image: puzzle/agent:latest
    container_name: creator
    environment:
      AGENT_ROLE: "CREATOR"
      LISTEN_ADDR: ":9001"
      ENDPOINT_PATH: "/mcp"
      MISTRAL_API_KEY: ${MISTRAL_API_KEY:?set MISTRAL_API_KEY in .env}
      MISTRAL_MODEL: ${MISTRAL_MODEL:-mistral-small-latest}
      MISTRAL_BASE_URL: ${MISTRAL_BASE_URL:-https://api.mistral.ai/v1}
    networks:
      - puzzlenet
    ports:
      - "9001:9001"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:9001/healthz"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  # ── агент-проверяющий ───────────────────────────────────────────────────────
  checker:
    build:
      context: ./agent-a
    image: puzzle/agent:latest
    container_name: checker
    environment:
      AGENT_ROLE: "CHECKER"
      LISTEN_ADDR: ":9002"
      ENDPOINT_PATH: "/mcp"
      MISTRAL_API_KEY: ${MISTRAL_API_KEY:?set MISTRAL_API_KEY in .env}
      MISTRAL_MODEL: ${MISTRAL_MODEL:-mistral-small-latest}
      MISTRAL_BASE_URL: ${MISTRAL_BASE_URL:-https://api.mistral.ai/v1}
    networks:
      - puzzlenet
    ports:
      - "9002:9002"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:9002/healthz"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  # ── MCP-роутер + хранилище ─────────────────────────────────────────────────
  mcp-server:
    build:
      context: ./mcp-server
    image: puzzle/mcp-server:latest
    container_name: mcp-server
    environment:
      LISTEN_ADDR: ":9000"
      ENDPOINT_PATH: "/mcp"
      CREATOR_URL: "http://creator:9001/mcp"
      CHECKER_URL: "http://checker:9002/mcp"
    networks:
      - puzzlenet
    ports:
      - "9000:9000"
    restart: unless-stopped
    depends_on:
      creator:
        condition: service_healthy
      checker:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:9000/healthz"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  # ── агент-игрок (интерактивный) ─────────────────────────────────────────────
  player:
    build:
      context: ./agent-a
    image: puzzle/agent:latest
    container_name: player
    profiles: ["interactive"]
    environment:
      AGENT_ROLE: "PLAYER"
      GAME_SERVER_URL: "http://mcp-server:9000/mcp"
      MISTRAL_API_KEY: ${MISTRAL_API_KEY:?set MISTRAL_API_KEY in .env}
      MISTRAL_MODEL: ${MISTRAL_MODEL:-mistral-small-latest}
      MISTRAL_BASE_URL: ${MISTRAL_BASE_URL:-https://api.mistral.ai/v1}
    networks:
      - puzzlenet
    stdin_open: true
    tty: true
    restart: "no"
    depends_on:
      mcp-server:
        condition: service_healthy

networks:
  puzzlenet:
    driver: bridge
